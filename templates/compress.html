{% extends 'base.html' %}
{% block head %}
    <style>body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5; /* #f5f5f5;*/
    }
    .box {
        background: rgb(94, 92, 92); /*whie*/
        padding: 20px;
        margin: 50px auto;
        width: 50vw;
        /*300 px*/
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }
    </style>
{% endblock head %}
{% block body %}
    <div class="box">
    <h2>Image Compressor</h2>
    <form action="/compressor" method="post" enctype="multipart/form-data">

        <input type="file" name="image" id="imageInput" required>
        <p id="fileSize" style="font-weight:bold; color:rgb(237, 237, 241);"></p>
        <input type="number" name="target_size" id="targetSize" placeholder="Enter size in KB" required><br>
        <br><button type="submit" onclick="this.innerText='Compressing...'">Compress Image</button>
    </form>
    </div>

    <script>
        document.getElementById("imageInput").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                let sizeKB = file.size / 1024;
                let sizeText = "";
                
                if (sizeKB < 1024) {
                    sizeText = sizeKB.toFixed(2) + " KB";
                } else {
                    sizeText = (sizeKB / 1024).toFixed(2) + " MB";
                }
                document.getElementById("fileSize").innerText = "Original Size: " + sizeText;
                document.getElementById("targetSize").value = Math.round(sizeKB / 2);
            }
        });
    </script>


{% endblock body %}
