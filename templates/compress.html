{% extends 'base.html' %}
{% block head %}
    <style>:root {
            --primary-glow: #007bff;
            --accent: #00d4ff;
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        /* Container Resizer */
        .compressor-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff; /* Neumorphic Shadow */
            width: 100%;
            max-width: 450px;
            margin-top: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .compressor-card h2 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        /* Style for File Input */
        .file-input-wrapper {
            background: #eef1f6;
            padding: 50px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px dashed #007bff;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-input-wrapper:hover {
            background: #e0e7ff;
        }
        /* Modern Input Fields */
        input[type="number"]{
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: #f8fafc;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #ffffff;
            border: 1px solid var(--primary-glow);
        }
        /* Glowing Button */
        .compress-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .compress-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.4);
        }
        .compress-btn:active {
            transform: scale(0.98);
        }
    </style>
{% endblock head %}
{% block body %}
<div class="compressor-card">
    <form action="/compressor" method="post" enctype="multipart/form-data">
        <h2>Image Compressor</h2>

        <div class="file-input-wrapper">    
            <input type="file" name="image"  id="imageInput" required>
        </div>

        <p id="fileSize" style="font-weight:bold; color:rgb(49, 49, 55);"></p>

        <input type="number" name="target_size" id="targetSize" placeholder="Size (kb)" required><br>
        <button  class="compress-btn" type="submit" onclick="this.innerText='Compressing...'">Compress Image</button>
    </form>
 </div>

<script>
    document.getElementById("imageInput").addEventListener("change", function() {
        const file = this.files[0];
        if (file) {
            let sizeKB = file.size / 1024;
            let sizeText = "";
            
            if (sizeKB < 1024) {
                sizeText = sizeKB.toFixed(2) + " KB";
            } else {
                sizeText = (sizeKB / 1024).toFixed(2) + " MB";
            }
            document.getElementById("fileSize").innerText = "Original Size: " + sizeText;
            document.getElementById("targetSize").value = Math.round(sizeKB / 2);
        }
    });
</script>

{% endblock body %}
