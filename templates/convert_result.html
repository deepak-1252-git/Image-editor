{% extends 'convert.html' %}

{% block head %}
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }
        .box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            margin: 60px auto;
            width: 90%;
            max-width: 550px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        h2 { font-weight: 600; color: #1e293b; margin-bottom: 20px; }

        /* Image/PDF Preview Frame */
        .img-container {
            background: #e2e8f0;  
            padding: 10px;
            margin-bottom: 25px;
            display: inline-block;
            position: relative; /* Overlay ke liye */
            width: 120px;
            height: 160px;
            box-shadow: inset 6px 6px 12px #cbd5e1, 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 10px;
            cursor: zoom-in !important; /* Cursor yahan fix kiya */
        }

        /* Invisible Layer jo click allow karegi */
        .click-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            background: transparent;
        }

        .preview-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none; /* Mouse events overlay ko milenge */
        }

        /* --- Modal Styles --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content-img {
            max-width: 80%; max-height: 80%;
            border-radius: 10px;
        }
        #pdf-modal-frame {
            width: 80%; height: 85vh;
            border: none; border-radius: 10px;
            display: none;
        }
        .close-hint {
            position: fixed; top: 20px; color: white;
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            border-radius: 20px; pointer-events: none;
        }

        /* Stats & Buttons */
        .stats-container {
            background: rgba(0, 123, 255, 0.05);
            padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        .btn-main {
            display: block; padding: 15px; margin-bottom: 10px;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white; text-decoration: none; border-radius: 15px; font-weight: 600;
        }
        .btn-secondary {
            display: block; padding: 12px;
            background: #f1f5f9; color: #475569;
            text-decoration: none; border-radius: 15px;
        }
    </style>
{% endblock head %}

{% block body %}
    <div class="box">
        <h2>✨ Preview</h2>

        {% for file in files %}
            <div class="img-container" onclick="openModal('/outputs/{{ file }}', '{{ file_type }}')"> 
                <div class="click-overlay"></div> {% if file_type == 'PDF' %}
                    <iframe class="preview-content" src="/outputs/{{ file }}"></iframe>
                {% else %}
                    <img class="preview-content" src="/outputs/{{ file }}"> 
                {% endif %}
            </div>

            <div class="stats-container"> 
                <p><b>File:</b> {{ file }}</p>
            </div>
        
            <div class="btn-group">
                <a class="btn-main" href="/download/{{ file }}">📥 Download File</a> 
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        {% endfor %}

        <a class="btn-secondary" href="/convertor">↺ Convert Another</a>

        <div id="myModal" class="modal" onclick="closeModal()">
            <div class="close-hint">Click outside to close</div>
            
            <img class="modal-content-img" id="img01" style="display:none;">
            
            <iframe id="pdf-modal-frame" src=""></iframe>
        </div> 
    </div>
        
    <script>
        function openModal(fileUrl, type) {
            const modal = document.getElementById("myModal");
            const modalImg = document.getElementById("img01");
            const modalPdf = document.getElementById("pdf-modal-frame");
            
            modal.style.display = "flex";

            if (type === 'PDF') {
                modalImg.style.display = "none";
                modalPdf.style.display = "block";
                modalPdf.src = fileUrl; // PDF load ho jayegi
            } else {
                modalPdf.style.display = "none";
                modalImg.style.display = "block";
                modalImg.src = fileUrl; // Image load ho jayegi
            }
        }
        
        function closeModal() {
            const modal = document.getElementById("myModal");
            const modalPdf = document.getElementById("pdf-modal-frame");
            modal.style.display = "none";
            modalPdf.src = ""; // Stop PDF when closed
        }
    </script>
{% endblock body %}
