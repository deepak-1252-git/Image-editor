{% extends 'base.html' %}
{% block head %}
   <link rel="stylesheet" href="../static/pdftool.css">
{% endblock head %}

{% block body %}
<div class="pdf-wrapper">
    <div class="main-card">
        <div class="text-center mb-5">
            <h2 style="font-family: 'Montserrat'; font-weight: 800;">PDF Master</h2>
            <p style="color: #94a3b8;">Fast, Secure, and Client-Side PDF Processing.</p>
        </div>

        <form id="pdfForm">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-pdf fa-4x mb-3" style="color: var(--pdf-red);"></i>
                <h4 id="fileLabel">Select PDF Files</h4>
                <input type="file" id="fileInput" name="pdfs" multiple accept=".pdf" hidden required>
            </div>

            <div class="action-grid">
                <div class="action-card">
                    <input type="radio" id="merge" name="type" value="merge-pdf" checked onclick="toggleExtras()">
                    <label for="merge">Merge</label>
                </div>
                <div class="action-card">
                    <input type="radio" id="split" name="type" value="split-pdf" onclick="toggleExtras()">
                    <label for="split">Split</label>
                </div>
                <div class="action-card">
                    <input type="radio" id="lock" name="type" value="lock-pdf" onclick="toggleExtras()">
                    <label for="lock">Lock</label>
                </div>
            </div>

            <div id="splitInput">
                <input type="text" name="page" class="pdf-input" placeholder="Page number or range (e.g. 1-3)">
            </div>
            <div id="lockInput">
                <input type="password" name="password" class="pdf-input" placeholder="Set Password">
            </div>

            <button type="submit" class="btn-process mt-4" id="submitBtn">Process PDF</button>
        </form>

        <div id="resultArea">
            <h4 class="mb-3">✅ Your PDF is Ready</h4>
            <a id="downloadBtn" href="#" class="btn btn-light w-100 p-3" style="border-radius: 12px; font-weight: 700;">📥 Download Document</a>
            <div class="btn-reset">
                <a href="/pdf_tool" style="color: var(--secondary); text-decoration: none;">↺ New pdf</a>
            </div>
        </div>
    </div>
</div>

<script src="/static/pdftool.js"></script>
{% endblock body %}
