<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
 
    <title>All In One Web</title>
    <style> 
        :root {
        --primary: #007bff;
        --secondary: #00d4ff;
        --bg: #f8f9fa;
        --text: #333;
        }
        body {
            font-family: 'Poppins', sans-serif;
            /* URL or image path  */
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)),
                url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* Keeps the image still while you scroll */
            margin: 0;
            min-height: 100vh;
        }
        /* Navbar */
        nav {
            background: #222;
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            color: white;
            width: 100vw;
        }
        nav h1 {
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1px;
        }
        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
        }
        /* Main Container */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Tool Cards */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;   
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 123, 255, 0.15);
            border-color: var(--primary);
        }
        .icon-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .card h3 {
            margin: 10px 0;
            font-weight: 600;
        }
        .card p {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }
        .btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .card:hover .btn {
            background: #222;
            color: white;
        }
    </style>

{% block head %}
    
{% endblock head %} 

</head>
<body>
    <nav>
        <h1>ALL ARE HERE</h1>
        <a href="/">Home</a>
    </nav>

{% block body %}

{% endblock body %}
</body>
</html>
