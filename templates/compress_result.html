{% extends 'base.html' %}
{% block head %}
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }
        .box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            margin: 60px auto;
            width: 90%;
            max-width: 550px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        h2 {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        /* Image Preview Frame */
       .img-container {
            background: #e2e8f0;  
            padding: 10px;
            margin-bottom: 25px;
            display: inline-block;
            max-width: 100px;
            box-shadow: 
                inset 6px 6px 12px #cbd5e1, 
                inset -6px -6px 12px #ffffff,
                0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid #cbd5e1;
            cursor: zoom-in;
            transition: transform 0.3s ease; 
        }
        .img-container:hover {
            transform: scale(1.02);
        }
        img {
            max-width: 100%; 
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* --- Modal (Pop-up) Styles --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            cursor: zoom-out; /* Pure screen par zoom-out cursor dikhega */
        }
        .modal-content {
            max-width: 70%; 
            max-height: 80%;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            cursor: default; /* Image par cursor normal rahega */
        }
        /* Updated: Text Overlay - This puts the text ON the image */
        .close-hint {
            position: fixed;  
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            pointer-events: none;
            z-index: 1001;
            border: 1px solid rgba(255,255,255,0.2);
        }
         /* Stats Panel */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0, 123, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 123, 255, 0.1);
        }
        .stats-container p {
            margin: 5px 0;
            font-size: 0.95rem;
            color: #475569;
        }
        .stats-container b {
            color: #007bff;
        }
        .reduction-badge {
            grid-column: span 2;
            background: #dcfce7;
            color: #15803d;
            padding: 5px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        /* Modern Action Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-main {
            padding: 15px 30px;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
        }
        .btn-secondary {
            padding: 12px 30px;
            background: #f1f5f9;
            color: #475569;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
            border: 1px solid #e2e8f0;
        }
        .btn-main:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.4);
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
    </style>
{% endblock head %}
{% block body %}
    <div class="box">
        <h2>✨ Ready to Go!</h2>

        <div class="img-container" onclick="openModal()">
            <img id="myImg" src="/outputs/{{ filename }}" alt="Compressed Image">
        </div>

        <div id="myModal" class="modal" onclick="closeModal()">
            <div class="close-hint">Click on image to close</div>
            <img class="modal-content" id="img01" >
        </div>
       
        <div class="stats-container">
            <p><b>Original Size:</b> {{ original_size }}</p>
            <p><b>Compressed Size:</b> {{ compressed_size }}</p>

            <div class="reduction-badge">
                📉 Reduced by {{ reduction }}%
            </div>  
        </div>

        <div class="btn-group">
            <a class="btn-main" href="/download/{{ filename }}">📥 Download Image</a>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
            <a class="btn-secondary" href="/compressor">↺ Compress Another Image</a>
        </div>
    </div>

    <script>
        function openModal() {
            var modal = document.getElementById("myModal");
            var img = document.getElementById("myImg");
            var modalImg = document.getElementById("img01");
            
            modal.style.display = "flex";
            modalImg.src = img.src;
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }
    </script>
{% endblock body %}
