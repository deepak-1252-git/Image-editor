{% extends 'base.html' %}
{% block head %}
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 600px;
            border-radius: 10px;
            border: 1px dashed gray; 
            box-shadow: 0 0 10px gray;
        }
        img {
            max-width: 100%;
            margin: 10px 0;
        }
        .green {
            display: inline-block;
            padding: 10px;
            background: rgb(41, 128, 41);
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
{% endblock head %}
{% block body %}
    <div class="box">
        <h2>Image Preview</h2>
            <img src="/outputs/{{ filename }}" ><br>
            <p><b>Original Size:</b> {{ original_size }}</p>
            <p><b>Compressed Size:</b> {{ compressed_size }}</p>
            <p><b>Size Reduced:</b> {{ reduction }}%</p>
            <a class="green" href="/download/{{ filename }}">Download</a>
            <br><br>
            <a class="green" href="/compressor" >Compress Another Image</a>
    </div>
{% endblock body %}
