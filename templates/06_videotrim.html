{% extends 'base.html' %}
{% block head %}
    <link rel="stylesheet" href="../static/06_videotrim.css">
{% endblock head %}

{% block body %}
<div class="editor-container">
    <div class="video-main">
        <div class="video-screen">
            <video id="vPlayer" controls ></video>
            <div id="no-video" style="color: #f8fbfe;"></div>
        </div>
        
        <div class="mt-4">
            <input type="range" id="vSeeker" class="seek-slider" min="0" step="0.1" value="0">
            <div class="d-flex justify-content-between mt-2" style="font-family: monospace; font-size: 0.9rem;">
                <span id="curTime">00:00</span>
                <span id="totTime">00:00</span>
            </div>  
        </div>
    </div>
    
    <div class="control-video-sidebar">
        <h3>Video Editor</h3>
        
        <div class="control-group">
            <div class="file-drop" onclick="document.getElementById('vFile').click()">
                <i class="fas fa-file-video mb-2"></i>
                <div id="vName" style="font-size: 0.8rem;">Upload Video</div>
                <input type="file" id="vFile" name="video" accept="video/*" hidden required>
            </div>
        </div>

        <div class="control-group">
            <label>:) Trim Range (Seconds)</label>
            <div class="d-flex gap-2">
                <input type="number" id="vStart" class="v-input" value="0" placeholder="Start">
                <input type="number" id="vEnd" class="v-input" placeholder="End">
            </div>
        </div>

        <div class="control-group">
            <label>:)  Filter & Speed</label>
            <div class="d-flex gap-2">
                <select id="vSpeed" name="speed" class="v-input">
                    <option value="0.5">0.5x (Slow Motion)</option>
                    <option value="1.0" selected>1.0x (Normal)</option>
                    <option value="1.5">1.5x (Fast)</option>
                    <option value="2.0">2.0x (Very Fast)</option>
                </select>
                <select id="vFilter" name="filter" class="v-input">
                    <option value="none">Original</option>
                    <option value="bw">Black & White</option>
                    <option value="sepia">Vintage Sepia</option>
                </select>
            </div>  
        </div>

        <div class="control-group">
            <label>:) Formate & Audio  </label>
            <div class="d-flex gap-2">
                <select id="vFormat" name="format" class="v-input">
                    <option value="mp4">Video (MP4)</option>
                    <option value="gif">Animated GIF</option>
                </select>
                <label class="v-input">
                    <input type="checkbox" id="vMute">
                    <span style="font-size: 0.75rem;">Mute Audio</span>
                </label>
            </div>
        </div>

        <button id="renderBtn" class="btn-tool btn-download" onclick="cropImage(this)">
            <i class="fas fa-download me-2"></i> Save & Download
        </button>
    </div>
</div>

<div id="overlay">
    <div class="spinner-border text-primary mb-3"></div>
    <p>Processing Video... Please wait.</p>
</div>


<script src="/static/06_videotrim.js" ></script>
 
{% endblock body %}
