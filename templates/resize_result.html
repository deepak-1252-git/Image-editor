{% extends 'resize.html' %}
{% block head %}
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 600px;
            border-radius: 10px;
            border: 1px dashed gray; 
            box-shadow: 0 0 10px gray;
        }
        img {
            max-width: 100%;
            margin: 10px 0;
        }
        .green {
            display: inline-block;
            padding: 10px;
            background: rgb(41, 128, 41);
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
{% endblock head %}
{% block body %}
    <div class="box">
    <h2>Preview</h2>
        <img src="/outputs/{{ filename }}" alt="Resized Image">
        <br>
        <p><b>Resolution:</b> {{ resolution[0] }} x {{ resolution[1] }}</p>
        <p><b>File Size:</b> {{ file_size }}  KB</p>     
        <a class="green" href="/download/{{ filename }}">Download Image</a>
        <br><br>
        <a class="green" href="/resizer" >Resize Another Image</a>

    </div>
{% endblock body %}
